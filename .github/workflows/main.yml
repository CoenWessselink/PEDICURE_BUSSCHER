name: Build Joanne Busscher Pedicure website

on:
  push:
    branches:
      - main
      - feature/podofile-premium-website
  pull_request:
    branches:
      - main

jobs:
  build:
    name: Build static website
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build website
        run: npm run build
